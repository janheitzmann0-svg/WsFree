<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>LaczyPrime · Building physics field manual</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'none';
        script-src 'self';
        style-src 'self';
        img-src 'self' data:;
        font-src 'self';
        connect-src 'none';
        manifest-src 'self';
        worker-src 'self';
        base-uri 'none';
        form-action 'none';
      "
    />

    <!-- PWA wiring -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#1e4860" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#16140f" media="(prefers-color-scheme: dark)" />
    <meta name="application-name" content="LaczyPrime" />
    <meta name="description" content="LaczyPrime — building physics field manual." />

    <!-- iOS standalone -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LaczyPrime" />

    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="uvalue-app.js"></script>
  </body>
</html>
